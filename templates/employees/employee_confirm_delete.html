{% extends "base.html" %}
{% block title %}Delete Employee{% endblock %}
{% block content %}
<div class="card p-4" style="max-width: 500px;">
    <h5>Delete "{{ object.nama }}"?</h5>
    <p class="text-muted">This will also remove their attendance history. This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'employee-list' %}" class="btn btn-link">Cancel</a>
    </form>
</div>
{% endblock %}
